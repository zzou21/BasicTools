<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Basic Tools</title>
    <link rel="stylesheet" href="assets/styles/styles.css" />
  </head>

  <body>
    <div class="container">

      <!-- header-->
      <header class="header">
        <h1 class="header__title">Basic Tools</h1>
        <p class="header__desc">
          A minimum-computing tool suite of everyday digital and computational utilities designed to run locally on your machines.
        </p>

      </header>



      <div class="divider"></div>

      <nav class="menubar">
        <button class="menubar__item" data-action="about">About</button>
        <!-- TODO: add more menu items here -->
      </nav>
      
      <div class="divider"></div>

      <!-- list of buttons -->
      <!--
        HOW TO ADD A TOOL:
        1. Copy a <button class="tool-btn"> block below.
        2. Fill in the icon, name, and hint.
        3. Set onclick="openTool('yourToolName')" — the handler lives in ui.js.
        4. Remove the  tool-btn--soon  class and  disabled  attribute when ready.
      -->
      <p class="header__desc">Choose a tool to use (with more tools to be added):</p>

      <div class="tools-grid">

        <!-- tool one: file finder -->
        <button class="tool-btn" data-tool="fileFinder">
          <span class="tool-btn__name">File Finder</span>
          <span class="tool-btn__hint">Find the files you need in a specific folder.</span>
        </button>

        <!-- tool two: image converter -->
        <button class="tool-btn" data-tool="imageConverter">
          <span class="tool-btn__name">Image Converter</span>
          <span class="tool-btn__hint">Convert and rename images in bulk.</span>
        </button>

        <!-- Tool 3 — pdf combiner -->
        <button class="tool-btn" data-tool="pdfMerger">
          <span class="tool-btn__name">PDF Merger</span>
          <span class="tool-btn__hint">Combine multiple PDFs into one.</span>
        </button>

        <!-- Tool 3 — pdf combiner -->
        <button class="tool-btn">
          <span class="tool-btn__name">More Tools To Be Released. Go to <i>Basic Tools</i>' website (in "About" above) to suggest a new tool to be added.</span>
          <span class="tool-btn__hint"></span>
        </button>

        
        <!-- more tools to be added -->

      </div>
      <p class="section__description">To report a bug, visit <i>Basic Tools</i>' <a href="https://zzou21.github.io/BasicToolsWeb/" target="_blank" rel="noopener noreferrer">website</a> and go to its "Contact" page.</p>

      <footer class="footer">
        <p id="info"></p>
      </footer>

    </div>

    <script src="renderer.js"></script>
    <script src="ui.js"></script>
  </body>
</html>
