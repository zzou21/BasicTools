name: Build and Release
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        if: matrix.os == 'macos-latest'
        run: npx @electron/rebuild -f -w sharp

      - name: Debug forge config
        run: cat forge.config.js

            
      - name: Import signing certificate
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_CONTENT }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          
          echo "Signing identities found:"
          security find-identity -v -p codesigning build.keychain

          echo "App bundles found:"
          find . -name "*.app"
      - name: Sign sharp binaries
        if: matrix.os == 'macos-latest'
        timeout-minutes: 5
        run: |
          for binary in \
            "node_modules/@img/sharp-darwin-arm64/lib/sharp-darwin-arm64.node" \
            "node_modules/@img/sharp-libvips-darwin-arm64/lib/libvips-cpp.8.17.3.dylib"; do
            echo "Signing: $binary"
            codesign --sign "Developer ID Application: Zhihui Zou (AQ22UGTB48)" \
                    --force \
                    --timestamp \
                    --options runtime \
                    --entitlements entitlements.mac.plist \
                    "$binary"
            echo "Done: $binary"
          done
      
      - name: Make distributables (Mac arm64)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_CONTENT }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run make -- --arch=arm64

      - name: Make distributables (Mac x64)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_CONTENT }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npm run make -- --arch=x64

      - name: Make distributables (Windows and Linux)
        if: matrix.os != 'macos-latest'
        run: npm run make -- --verbose

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/make/**/*